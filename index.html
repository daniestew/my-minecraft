<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Minecraft</title>
    <style>
        * { margin: 0; padding: 0; }
        body { overflow: hidden; background: #000; }
        canvas { display: block; }
        #crosshair {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            pointer-events: none;
            z-index: 10;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        #hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            z-index: 10;
        }
        .hotbar-slot {
            width: 60px; height: 60px;
            border: 2px solid #555;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            font-family: monospace;
            text-align: center;
        }
        .hotbar-slot.selected {
            border-color: #fff;
            background: rgba(255,255,255,0.2);
        }
        .hotbar-slot .count {
            position: absolute;
            bottom: 3px; right: 5px;
            font-size: 14px;
            color: #fff;
            text-shadow: 1px 1px 1px #000;
            pointer-events: none;
        }
        .hotbar-slot {
            position: relative;
        }
        #inventory {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30,30,30,0.95);
            border: 3px solid #666;
            border-radius: 12px;
            padding: 40px 50px;
            z-index: 30;
            display: none;
        }
        #inventory h2 {
            color: #fff;
            font-family: monospace;
            font-size: 36px;
            margin-bottom: 24px;
            text-align: center;
        }
        #inv-grid {
            display: grid;
            grid-template-columns: repeat(4, 120px);
            gap: 12px;
            justify-content: center;
        }
        .inv-slot {
            width: 120px; height: 120px;
            border: 2px solid #555;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            border-radius: 4px;
        }
        .inv-slot:hover {
            border-color: #aaa;
            background: rgba(255,255,255,0.1);
        }
        .inv-slot .count {
            position: absolute;
            bottom: 6px; right: 8px;
            font-size: 22px;
            color: #fff;
            font-family: monospace;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
        }
        .inv-slot .name {
            position: absolute;
            top: 5px; left: 6px;
            font-size: 13px;
            color: #ccc;
            font-family: monospace;
            pointer-events: none;
        }
        #instructions {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            z-index: 20;
            background: rgba(0,0,0,0.7);
            padding: 40px;
            border-radius: 8px;
        }
        #instructions h1 { font-size: 32px; margin-bottom: 20px; }
        #instructions p { margin: 8px 0; }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="hotbar"></div>
    <div id="inventory">
        <h2>Inventory</h2>
        <div id="inv-grid"></div>
    </div>
    <div id="instructions">
        <h1>My Minecraft</h1>
        <p>Click to start</p>
        <p>WASD - Move | Space - Jump</p>
        <p>Left Click - Break | Right Click - Place</p>
        <p>Right-drag - Look (if pointer lock unavailable)</p>
        <p>1-6 - Select Block | Scroll - Cycle Blocks</p>
        <p>E - Open Inventory</p>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
